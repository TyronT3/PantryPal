<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ChoresPal</title>
<style>
  :root{
    --bg:#0f1117;--surface:#1a1d27;--card:#22263a;--accent:#00c896;--accent2:#0088ff;
    --pink:#e91e8c;--yellow:#ff9800;--red:#f44336;--green:#4caf50;--purple:#9c27b0;
    --text:#e8eaf6;--muted:#8892b0;--border:#2e3250;--radius:14px;
    --tyron:#2196f3;--ansonette:#e91e8c;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;}
  #chore-screen{display:none;flex-direction:column;min-height:100vh;max-width:600px;margin:0 auto;padding-bottom:90px;}
  header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
  .header-left{display:flex;align-items:center;gap:10px;}
  .header-logo{font-size:22px;}
  .header-title{font-size:18px;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
  .icon-btn{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:7px 9px;color:var(--text);cursor:pointer;font-size:15px;}
  .tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);}
  .tab{flex:1;padding:12px 4px;text-align:center;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;}
  .tab.active{color:var(--accent);border-bottom-color:var(--accent);}

  /* SCORE */
  .score-banner{display:flex;margin:12px 16px 0;border-radius:var(--radius);overflow:hidden;border:1px solid var(--border);}
  .score-side{flex:1;padding:14px;text-align:center;}
  .score-side.tyron{background:rgba(33,150,243,.1);border-right:1px solid var(--border);}
  .score-side.ansonette{background:rgba(233,30,140,.1);}
  .score-name{font-size:11px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;}
  .score-side.tyron .score-name{color:var(--tyron);}
  .score-side.ansonette .score-name{color:var(--ansonette);}
  .score-pts{font-size:26px;font-weight:800;}
  .score-side.tyron .score-pts{color:var(--tyron);}
  .score-side.ansonette .score-pts{color:var(--ansonette);}
  .score-sub{font-size:11px;color:var(--muted);margin-top:2px;}

  /* GOAL CARDS */
  .goal-strip{padding:10px 16px 0;}
  .goal-card{border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;border:1px solid;}
  .goal-card.weekly{background:linear-gradient(135deg,rgba(0,200,150,.08),rgba(0,136,255,.08));border-color:var(--accent);}
  .goal-card.monthly{background:linear-gradient(135deg,rgba(255,152,0,.08),rgba(233,30,140,.08));border-color:var(--yellow);}
  .goal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
  .goal-title{font-size:13px;font-weight:700;}
  .goal-card.weekly .goal-title{color:var(--accent);}
  .goal-card.monthly .goal-title{color:var(--yellow);}
  .goal-days{font-size:11px;color:var(--muted);}
  .goal-prize{font-size:15px;font-weight:700;margin-bottom:10px;}
  .goal-prize span{font-size:11px;color:var(--muted);font-weight:400;margin-left:4px;}
  .goal-progress{display:flex;gap:8px;align-items:center;}
  .goal-bar-wrap{flex:1;}
  .goal-bar-labels{display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px;}
  .goal-bar-labels .t{color:var(--tyron);}
  .goal-bar-labels .a{color:var(--ansonette);}
  .goal-bar{height:8px;background:var(--border);border-radius:10px;overflow:hidden;display:flex;}
  .goal-bar-t{background:var(--tyron);height:100%;transition:width .4s;}
  .goal-bar-a{background:var(--ansonette);height:100%;transition:width .4s;}
  .goal-target{font-size:11px;color:var(--muted);text-align:right;margin-top:3px;}
  .goal-empty{background:var(--card);border:1px dashed var(--border);border-radius:var(--radius);padding:12px 16px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;}
  .goal-empty-txt{font-size:13px;color:var(--muted);}
  .goal-add-btn{background:var(--accent);border:none;border-radius:8px;padding:7px 14px;font-size:12px;font-weight:700;color:#fff;cursor:pointer;}

  /* CHORES */
  .chores-list{padding:0 16px;}
  .section-header{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin:12px 0 8px;font-weight:700;}
  .chore-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;}
  .chore-card.done{opacity:.55;}
  .chore-card.done .chore-name{text-decoration:line-through;}
  .chore-emoji{font-size:26px;flex-shrink:0;}
  .chore-info{flex:1;min-width:0;}
  .chore-name{font-size:15px;font-weight:600;margin-bottom:3px;}
  .chore-meta{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:4px;}
  .chore-pill{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600;}
  .pill-daily{background:#1a3d2b;color:var(--green);}
  .pill-weekly{background:#1a2a4a;color:var(--accent2);}
  .pill-monthly{background:#2d1f5e;color:#a78bfa;}
  .pill-once{background:#3d1a00;color:var(--yellow);}
  .pill-tyron{background:rgba(33,150,243,.15);color:var(--tyron);}
  .pill-ansonette{background:rgba(233,30,140,.15);color:var(--ansonette);}
  .pill-rotating{background:rgba(255,152,0,.15);color:var(--yellow);}
  .pill-pts{background:rgba(0,200,150,.15);color:var(--accent);}
  .chore-done-info{font-size:11px;color:var(--muted);margin-top:2px;}
  .chore-done-info.tyron{color:var(--tyron);}
  .chore-done-info.ansonette{color:var(--ansonette);}
  .chore-done-info.both{color:var(--accent);}
  .chore-actions{display:flex;flex-direction:column;gap:4px;align-items:flex-end;flex-shrink:0;}
  .done-btn{padding:8px 14px;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;}
  .done-btn:active{opacity:.7;}
  .count-badge{background:var(--accent);color:#fff;border-radius:10px;font-size:11px;font-weight:700;padding:2px 8px;text-align:center;}
  .undone-btn{background:none;border:1px solid var(--border);border-radius:8px;padding:5px 10px;font-size:12px;color:var(--muted);cursor:pointer;}
  .empty-state{text-align:center;padding:50px 20px;color:var(--muted);}
  .empty-state .big{font-size:48px;margin-bottom:10px;}
  .progress-wrap{margin:8px 16px 4px;}
  .progress-bar{background:var(--border);border-radius:10px;height:6px;overflow:hidden;margin-top:6px;}
  .progress-fill{background:linear-gradient(90deg,var(--accent),var(--accent2));height:100%;border-radius:10px;transition:width .4s;}

  /* GOALS TAB */
  .goals-section{padding:12px 16px;}
  .goals-section h3{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;font-weight:700;}
  .goal-list-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px;}
  .goal-list-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
  .goal-list-prize{font-size:15px;font-weight:700;}
  .goal-period-badge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:700;}
  .period-weekly{background:rgba(0,200,150,.15);color:var(--accent);}
  .period-monthly{background:rgba(255,152,0,.15);color:var(--yellow);}
  .goal-list-dates{font-size:11px;color:var(--muted);margin-bottom:8px;}
  .goal-winner-badge{display:inline-block;font-size:12px;padding:4px 10px;border-radius:10px;font-weight:700;}
  .winner-tyron{background:rgba(33,150,243,.2);color:var(--tyron);}
  .winner-ansonette{background:rgba(233,30,140,.2);color:var(--ansonette);}
  .winner-tie{background:rgba(0,200,150,.2);color:var(--accent);}
  .goal-scores{display:flex;gap:10px;margin-top:8px;}
  .goal-score-item{font-size:12px;color:var(--muted);}
  .del-goal-btn{background:none;border:none;color:var(--red);cursor:pointer;font-size:14px;}

  /* SETUP */
  .setup-section{padding:12px 16px;}
  .setup-add-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:16px;}
  .setup-add-card h3{font-size:15px;font-weight:700;margin-bottom:14px;}
  .form-row{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
  .form-row .field{flex:1;margin-bottom:0;min-width:100px;}
  .field{margin-bottom:12px;}
  .field label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px;}
  .field input,.field select{width:100%;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-size:14px;outline:none;}
  .field input:focus,.field select:focus{border-color:var(--accent);}
  .field select option{background:var(--card);}
  .emoji-input{width:60px!important;text-align:center;font-size:20px;}
  .pts-input{width:70px!important;text-align:center;}
  .chore-list-item{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px;}
  .cli-emoji{font-size:22px;flex-shrink:0;}
  .cli-info{flex:1;}
  .cli-name{font-size:14px;font-weight:600;}
  .cli-meta{font-size:11px;color:var(--muted);margin-top:2px;}
  .del-btn{background:none;border:none;color:var(--red);cursor:pointer;font-size:16px;padding:4px;}

  /* HISTORY */
  .history-list{padding:12px 16px;}
  .hist-item{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px;}
  .hist-icon{font-size:22px;flex-shrink:0;}
  .hist-info{flex:1;}
  .hist-name{font-size:14px;font-weight:600;}
  .hist-by{font-size:12px;margin-top:2px;}
  .hist-by.tyron{color:var(--tyron);}
  .hist-by.ansonette{color:var(--ansonette);}
  .hist-by.both{color:var(--accent);}
  .hist-time{font-size:11px;color:var(--muted);text-align:right;flex-shrink:0;}

  /* WINNER BANNER */
  .winner-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:500;display:flex;align-items:center;justify-content:center;padding:24px;}
  .winner-box{background:var(--surface);border-radius:20px;padding:32px 24px;text-align:center;width:100%;max-width:360px;border:2px solid var(--yellow);}
  .winner-trophy{font-size:64px;margin-bottom:12px;}
  .winner-title{font-size:22px;font-weight:800;margin-bottom:8px;}
  .winner-prize{font-size:16px;color:var(--yellow);font-weight:700;margin-bottom:6px;}
  .winner-sub{font-size:13px;color:var(--muted);margin-bottom:20px;}
  .winner-close{background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:12px;padding:14px 32px;font-size:15px;font-weight:700;color:#fff;cursor:pointer;width:100%;}

  /* MODAL */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:flex;align-items:flex-end;justify-content:center;}
  .modal{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-width:600px;max-height:92vh;overflow-y:auto;padding:20px 20px 40px;}
  .modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px;}
  .modal h2{font-size:18px;margin-bottom:16px;font-weight:700;}
  .modal-close{float:right;background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;margin-top:-4px;}
  .modal .btn{margin-top:8px;}
  .btn{width:100%;padding:13px;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;transition:opacity .2s;}
  .btn:active{opacity:.8;}
  .btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;}
  .btn-secondary{background:var(--card);color:var(--text);border:1px solid var(--border);margin-top:10px;}
  .btn-sm{padding:8px 14px;font-size:13px;border-radius:8px;border:none;cursor:pointer;font-weight:600;}
  .who-btns{display:flex;gap:10px;margin-bottom:8px;}
  .who-btn{flex:1;padding:16px;border:2px solid var(--border);border-radius:12px;background:var(--card);font-size:15px;font-weight:700;cursor:pointer;text-align:center;}
  .who-btn.tyron{border-color:var(--tyron);background:rgba(33,150,243,.15);color:var(--tyron);}
  .who-btn.ansonette{border-color:var(--ansonette);background:rgba(233,30,140,.15);color:var(--ansonette);}
  .who-btn.both{border-color:var(--accent);background:rgba(0,200,150,.15);color:var(--accent);}
  .who-btn:active{opacity:.75;}
  .fab{position:fixed;bottom:24px;right:24px;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;color:#fff;font-size:24px;cursor:pointer;box-shadow:0 4px 20px rgba(0,200,150,.4);display:flex;align-items:center;justify-content:center;z-index:50;}
  #toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--border);border-radius:20px;padding:10px 20px;font-size:13px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:200;white-space:nowrap;}
  #toast.show{opacity:1;}
  .spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .loading{display:flex;align-items:center;justify-content:center;padding:40px;color:var(--muted);}
</style>
</head>
<body>

<div id="chore-screen">
  <header>
    <div class="header-left">
      <span class="header-logo">🧹</span>
      <span class="header-title">ChoresPal</span>
    </div>
    <div style="display:flex;gap:6px">
      <button class="icon-btn" onclick="window.location.href='home.html'">🏠</button>
    </div>
  </header>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('today',this)">✅ Today</div>
    <div class="tab" onclick="switchTab('goals',this)">🏆 Goals</div>
    <div class="tab" onclick="switchTab('history',this)">📋 History</div>
    <div class="tab" onclick="switchTab('setup',this)">⚙️ Setup</div>
  </div>

  <div id="tab-today">
    <div id="score-area"></div>
    <div id="goal-strip" class="goal-strip"></div>
    <div id="progress-area"></div>
    <div class="chores-list" id="chores-today"></div>
  </div>

  <div id="tab-goals" style="display:none">
    <div class="goals-section">
      <div id="active-goals-section"></div>
      <div id="past-goals-section"></div>
    </div>
  </div>

  <div id="tab-history" style="display:none">
    <div class="history-list" id="history-content"><div class="loading"><span class="spinner"></span></div></div>
  </div>

  <div id="tab-setup" style="display:none">
    <div class="setup-section">
      <div class="setup-add-card">
        <h3>➕ Add a chore</h3>
        <div class="form-row">
          <div class="field" style="flex:0 0 60px"><label>Icon</label><input type="text" id="new-emoji" class="emoji-input" placeholder="🧹" maxlength="2"></div>
          <div class="field"><label>Chore name *</label><input type="text" id="new-name" placeholder="e.g. Vacuum lounge"></div>
        </div>
        <div class="form-row">
          <div class="field"><label>Frequency</label>
            <select id="new-freq">
              <option value="daily">📅 Daily</option>
              <option value="weekly">📆 Weekly</option>
              <option value="monthly">🗓️ Monthly</option>
              <option value="once">1️⃣ Once only</option>
            </select>
          </div>
          <div class="field"><label>Assigned to</label>
            <select id="new-assign">
              <option value="rotating">🔄 Rotating</option>
              <option value="Tyron">👨 Tyron</option>
              <option value="Ansonette">👩 Ansonette</option>
            </select>
          </div>
          <div class="field" style="flex:0 0 80px"><label>Points</label><input type="number" id="new-pts" class="pts-input" value="1" min="1" max="10"></div>
        </div>
        <button class="btn btn-primary" onclick="addChore()">Add Chore</button>
      </div>
      <div style="font-size:13px;color:var(--muted);margin-bottom:10px">Your chores (<span id="chore-count">0</span>)</div>
      <div id="chore-setup-list"></div>
      <div style="margin-top:16px;padding:14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);">
        <div style="font-size:13px;font-weight:700;margin-bottom:10px">⚡ Quick starter pack</div>
        <div style="display:flex;flex-wrap:wrap;gap:6px" id="starter-pack"></div>
      </div>
    </div>
  </div>

  <button class="fab" onclick="switchTabById('setup')">+</button>
</div>

<!-- Who did it? -->
<div class="modal-overlay" id="who-modal" style="display:none" onclick="closeModalClick(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <button class="modal-close" onclick="closeModal('who-modal')">✕</button>
    <h2 id="who-title">Who did it?</h2>
    <div class="who-btns">
      <button class="who-btn tyron" onclick="markDone('Tyron')">👨 Tyron</button>
      <button class="who-btn ansonette" onclick="markDone('Ansonette')">👩 Ansonette</button>
    </div>
    <button class="who-btn both" style="width:100%;margin-bottom:8px" onclick="markDone('Both')">👨👩 Together (split points)</button>
    <button class="btn btn-secondary" onclick="closeModal('who-modal')">Cancel</button>
  </div>
</div>

<!-- Add Goal Modal -->
<div class="modal-overlay" id="goal-modal" style="display:none" onclick="closeModalClick(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <button class="modal-close" onclick="closeModal('goal-modal')">✕</button>
    <h2 id="goal-modal-title">🏆 New Goal</h2>
    <div class="field"><label>Period</label>
      <select id="goal-period">
        <option value="weekly">📅 Weekly (resets Monday)</option>
        <option value="monthly">🗓️ Monthly (resets 1st)</option>
      </select>
    </div>
    <div class="field"><label>Prize 🎁 *</label><input type="text" id="goal-prize" placeholder="e.g. Back massage, Dinner choice…"></div>
    <div class="field"><label>Points target (optional)</label><input type="number" id="goal-target" placeholder="e.g. 20 — leave blank for no target" min="1"></div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:14px">The person with the most points at the end of the period wins the prize!</div>
    <button class="btn btn-primary" onclick="saveGoal()">🏆 Set Goal</button>
  </div>
</div>

<!-- Winner Banner -->
<div class="winner-overlay" id="winner-overlay" style="display:none">
  <div class="winner-box">
    <div class="winner-trophy">🏆</div>
    <div class="winner-title" id="winner-title">Tyron wins!</div>
    <div class="winner-prize" id="winner-prize">🎁 Prize: Back massage</div>
    <div class="winner-sub" id="winner-sub">This week's goal is complete</div>
    <button class="winner-close" onclick="closeWinnerBanner()">🎉 Celebrate!</button>
  </div>
</div>

<div id="toast"></div>

];

async function sbFetch(path,opts={}){
  const r=await fetch(SUPABASE_URL+path,{...opts,headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,...(opts.headers||{})}});
  const d=await r.json().catch(()=>({}));
  if(!r.ok)throw new Error(d.message||d.error||r.status);
  return d;
}
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}
function dateStr(d){return d.toISOString().slice(0,10);}

window.onload=()=>{
  if(!localStorage.getItem('fp_email')){window.location.href='index.html';return;}
  document.getElementById('chore-screen').style.display='flex';
  loadAll();
  renderStarterPack();
};

let chores=[],todayLogs=[],goals=[],activeTab='today';

async function loadAll(){
  try{
    const todayStart=new Date();todayStart.setHours(0,0,0,0);
    [chores,todayLogs,goals]=await Promise.all([
      sbFetch('/rest/v1/chores?active=eq.true&order=name.asc&select=*'),
      sbFetch(`/rest/v1/chore_logs?completed_at=gte.${todayStart.toISOString()}&order=completed_at.desc&select=*`),
      sbFetch('/rest/v1/chore_goals?active=eq.true&order=created_at.desc&select=*')
    ]);
    checkGoalExpiry();
    renderToday();
  }catch(e){toast('Error: '+e.message);}
}

// ── Goal helpers ──────────────────────────────────────────
function getWeekStart(){const d=new Date();d.setDate(d.getDate()-d.getDay());d.setHours(0,0,0,0);return d;}
function getWeekEnd(){const d=new Date();d.setDate(d.getDate()+(6-d.getDay()));d.setHours(23,59,59,999);return d;}
function getMonthStart(){const d=new Date();d.setDate(1);d.setHours(0,0,0,0);return d;}
function getMonthEnd(){const d=new Date(new Date().getFullYear(),new Date().getMonth()+1,0);d.setHours(23,59,59,999);return d;}
function daysLeft(endDate){return Math.max(0,Math.ceil((new Date(endDate)-new Date())/(864e5)));}

function getPeriodLogs(period){
  const start=period==='weekly'?getWeekStart():getMonthStart();
  return todayLogs.filter(l=>new Date(l.completed_at)>=start);
}

async function getPeriodLogsFromDB(period){
  const start=period==='weekly'?getWeekStart():getMonthStart();
  return await sbFetch(`/rest/v1/chore_logs?completed_at=gte.${start.toISOString()}&select=*`);
}

function calcPeriodScores(logs){
  let tyronPts=0,ansPts=0;
  logs.forEach(l=>{
    const c=chores.find(c=>c.id===l.chore_id);
    const pts=c?.points||1;
    if(l.shared){tyronPts+=Math.ceil(pts/2);ansPts+=Math.ceil(pts/2);}
    else if(l.completed_by==='Tyron')tyronPts+=pts;
    else if(l.completed_by==='Ansonette')ansPts+=pts;
  });
  return{tyron:tyronPts,ansonette:ansPts};
}

async function checkGoalExpiry(){
  const today=new Date();
  for(const goal of goals){
    if(new Date(goal.end_date)<today&&goal.active&&!goal.winner){
      // fetch full period logs for accurate scoring
      const logs=await getPeriodLogsFromDB(goal.period);
      const scores=calcPeriodScores(logs);
      let winner='tie';
      if(scores.tyron>scores.ansonette)winner='Tyron';
      else if(scores.ansonette>scores.tyron)winner='Ansonette';
      // save winner
      await sbFetch(`/rest/v1/chore_goals?id=eq.${goal.id}`,{method:'PATCH',body:JSON.stringify({winner,active:false})});
      goal.winner=winner;goal.active=false;
      // show banner (only once per goal)
      const shownKey=`goal_shown_${goal.id}`;
      if(!localStorage.getItem(shownKey)){
        localStorage.setItem(shownKey,'1');
        showWinnerBanner(goal,winner,scores);
      }
    }
  }
  goals=goals.filter(g=>g.active);
}

function showWinnerBanner(goal,winner,scores){
  const winnerName=winner==='tie'?'It\'s a tie!':winner==='Tyron'?'👨 Tyron wins!':'👩 Ansonette wins!';
  document.getElementById('winner-title').textContent=winnerName;
  document.getElementById('winner-prize').textContent=`🎁 Prize: ${goal.prize}`;
  document.getElementById('winner-sub').textContent=`${goal.period==='weekly'?'This week':'This month'} — Tyron ${scores.tyron}pts vs Ansonette ${scores.ansonette}pts`;
  document.getElementById('winner-overlay').style.display='flex';
}
function closeWinnerBanner(){document.getElementById('winner-overlay').style.display='none';}

// ── Render Today ──────────────────────────────────────────
function renderToday(){
  const todayStart=new Date();todayStart.setHours(0,0,0,0);
  let tyronPts=0,ansPts=0,tyronCount=0,ansCount=0;
  todayLogs.filter(l=>new Date(l.completed_at)>=todayStart).forEach(l=>{
    const c=chores.find(c=>c.id===l.chore_id);const pts=c?.points||1;
    if(l.shared){tyronPts+=Math.ceil(pts/2);ansPts+=Math.ceil(pts/2);tyronCount++;ansCount++;}
    else if(l.completed_by==='Tyron'){tyronPts+=pts;tyronCount++;}
    else if(l.completed_by==='Ansonette'){ansPts+=pts;ansCount++;}
  });

  document.getElementById('score-area').innerHTML=`
    <div class="score-banner">
      <div class="score-side tyron">
        <div class="score-name">👨 Tyron ${tyronPts>ansPts&&tyronPts>0?'🏆':''}</div>
        <div class="score-pts">${tyronPts}</div>
        <div class="score-sub">${tyronCount} done today</div>
      </div>
      <div class="score-side ansonette">
        <div class="score-name">👩 Ansonette ${ansPts>tyronPts&&ansPts>0?'🏆':''}</div>
        <div class="score-pts">${ansPts}</div>
        <div class="score-sub">${ansCount} done today</div>
      </div>
    </div>`;

  // goal strip
  renderGoalStrip();

  const repeatableChores=chores.filter(c=>c.frequency==='daily');
  const oneshotChores=chores.filter(c=>c.frequency!=='daily'&&isDueToday(c));
  const doneOnceShot=oneshotChores.filter(c=>getLogsForChoreToday(c.id).length>0);
  const pendingOnceShot=oneshotChores.filter(c=>getLogsForChoreToday(c.id).length===0);
  const totalDue=repeatableChores.length+oneshotChores.length;
  const totalDone=repeatableChores.filter(c=>getLogsForChoreToday(c.id).length>0).length+doneOnceShot.length;

  document.getElementById('progress-area').innerHTML=`
    <div class="progress-wrap">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:13px;color:var(--muted)">${totalDone}/${totalDue} done today</span>
        <span style="font-size:13px;color:var(--accent);font-weight:700">${totalDue>0?Math.round(totalDone/totalDue*100):0}%</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${totalDue>0?Math.round(totalDone/totalDue*100):0}%"></div></div>
    </div>`;

  if(!chores.length){document.getElementById('chores-today').innerHTML=`<div class="empty-state"><div class="big">🧹</div><div style="font-weight:700;margin-bottom:6px">No chores yet</div><div style="font-size:13px">Go to ⚙️ Setup</div></div>`;return;}

  const renderCard=(c,canRepeat)=>{
    const logs=getLogsForChoreToday(c.id);const count=logs.length;const lastLog=logs[0];
    const freqClass={daily:'pill-daily',weekly:'pill-weekly',monthly:'pill-monthly',once:'pill-once'}[c.frequency]||'pill-daily';
    const freqLabel={daily:'Daily',weekly:'Weekly',monthly:'Monthly',once:'Once only'}[c.frequency]||c.frequency;
    const assignPill=c.assigned_to==='rotating'?`<span class="chore-pill pill-rotating">🔄</span>`:c.assigned_to==='Tyron'?`<span class="chore-pill pill-tyron">👨</span>`:`<span class="chore-pill pill-ansonette">👩</span>`;
    const doneInfo=lastLog?(lastLog.shared?`👨👩 Together ×${count}`:`${lastLog.completed_by}${count>1?` ×${count}`:''}`):'';
    const doneClass=lastLog?lastLog.shared?'both':lastLog.completed_by.toLowerCase():'';
    return`<div class="chore-card ${count>0&&!canRepeat?'done':''}">
      <div class="chore-emoji">${c.emoji||'🧹'}</div>
      <div class="chore-info">
        <div class="chore-name">${esc(c.name)}</div>
        <div class="chore-meta"><span class="chore-pill ${freqClass}">${freqLabel}</span>${assignPill}<span class="chore-pill pill-pts">⭐ ${c.points}pt${c.points!==1?'s':''}</span></div>
        ${count>0?`<div class="chore-done-info ${doneClass}">✓ ${doneInfo}</div>`:''}
      </div>
      <div class="chore-actions">
        <button class="done-btn" onclick="openWhoModal('${c.id}')">✓ ${canRepeat&&count>0?'+1':'Done'}</button>
        ${count>0?`<div class="count-badge">×${count}</div>`:''}
        ${count>0?`<button class="undone-btn" onclick="undoChore('${logs[0].id}')">↩</button>`:''}
      </div>
    </div>`;
  };

  let html='';
  if(repeatableChores.length)html+=`<div class="section-header">🔄 Daily Chores</div>${repeatableChores.map(c=>renderCard(c,true)).join('')}`;
  if(pendingOnceShot.length)html+=`<div class="section-header">🔲 To Do</div>${pendingOnceShot.map(c=>renderCard(c,false)).join('')}`;
  if(doneOnceShot.length)html+=`<div class="section-header">✅ Completed</div>${doneOnceShot.map(c=>renderCard(c,false)).join('')}`;
  document.getElementById('chores-today').innerHTML=`<div>${html}</div>`;
}

function renderGoalStrip(){
  const weeklyGoal=goals.find(g=>g.period==='weekly');
  const monthlyGoal=goals.find(g=>g.period==='monthly');

  const renderGoalCard=(goal,type)=>{
    if(!goal)return`<div class="goal-empty">
      <span class="goal-empty-txt">${type==='weekly'?'📅 No weekly goal':'🗓️ No monthly goal'}</span>
      <button class="goal-add-btn" onclick="openGoalModal('${type}')">+ Set Goal</button>
    </div>`;
    const logs=getPeriodLogs(goal.period);
    const scores=calcPeriodScores(logs);
    const total=scores.tyron+scores.ansonette||1;
    const tPct=Math.round(scores.tyron/total*100);
    const aPct=100-tPct;
    const dl=daysLeft(goal.end_date);
    const target=goal.points_target;
    return`<div class="goal-card ${goal.period}">
      <div class="goal-header">
        <div class="goal-title">${goal.period==='weekly'?'📅 Weekly Goal':'🗓️ Monthly Goal'}</div>
        <div class="goal-days">${dl===0?'Ends today!':dl===1?'1 day left':`${dl} days left`}</div>
      </div>
      <div class="goal-prize">🎁 ${esc(goal.prize)} <span>— winner takes the prize!</span></div>
      <div class="goal-progress">
        <div class="goal-bar-wrap">
          <div class="goal-bar-labels">
            <span class="t">👨 Tyron: ${scores.tyron}pts</span>
            <span class="a">👩 Ansonette: ${scores.ansonette}pts</span>
          </div>
          <div class="goal-bar">
            <div class="goal-bar-t" style="width:${scores.tyron>0||scores.ansonette>0?tPct:50}%"></div>
            <div class="goal-bar-a" style="width:${scores.tyron>0||scores.ansonette>0?aPct:50}%"></div>
          </div>
          ${target?`<div class="goal-target">Target: ${target}pts</div>`:''}
        </div>
      </div>
    </div>`;
  };

  document.getElementById('goal-strip').innerHTML=renderGoalCard(weeklyGoal,'weekly')+renderGoalCard(monthlyGoal,'monthly');
}

// ── Goals Tab ─────────────────────────────────────────────
async function renderGoalsTab(){
  try{
    const allGoals=await sbFetch('/rest/v1/chore_goals?order=created_at.desc&select=*');
    const active=allGoals.filter(g=>g.active);
    const past=allGoals.filter(g=>!g.active);

    const renderGoalListCard=(g,isActive)=>{
      const winnerBadge=g.winner?g.winner==='tie'?`<span class="goal-winner-badge winner-tie">🤝 Tie</span>`:g.winner==='Tyron'?`<span class="goal-winner-badge winner-tyron">🏆 Tyron wins!</span>`:`<span class="goal-winner-badge winner-ansonette">🏆 Ansonette wins!</span>`:'';
      return`<div class="goal-list-card">
        <div class="goal-list-header">
          <div class="goal-list-prize">🎁 ${esc(g.prize)}</div>
          <div style="display:flex;gap:6px;align-items:center">
            <span class="goal-period-badge period-${g.period}">${g.period}</span>
            ${isActive?`<button class="del-goal-btn" onclick="deleteGoal('${g.id}')">🗑</button>`:''}
          </div>
        </div>
        <div class="goal-list-dates">${new Date(g.start_date).toLocaleDateString()} → ${new Date(g.end_date).toLocaleDateString()}</div>
        ${winnerBadge}
        ${g.points_target?`<div style="font-size:11px;color:var(--muted);margin-top:4px">Target: ${g.points_target}pts</div>`:''}
      </div>`;
    };

    let html='';
    html+=`<h3>Active Goals (${active.length})</h3>`;
    if(active.length)html+=active.map(g=>renderGoalListCard(g,true)).join('');
    else html+=`<div style="color:var(--muted);font-size:13px;margin-bottom:16px">No active goals. Set one below!</div>`;
    html+=`<div style="display:flex;gap:8px;margin-bottom:20px">
      <button class="btn btn-primary" style="font-size:13px" onclick="openGoalModal('weekly')">📅 Set Weekly Goal</button>
      <button class="btn btn-secondary" style="font-size:13px;margin-top:0" onclick="openGoalModal('monthly')">🗓️ Set Monthly Goal</button>
    </div>`;
    if(past.length){
      html+=`<h3>Past Goals (${past.length})</h3>`;
      html+=past.map(g=>renderGoalListCard(g,false)).join('');
    }
    document.getElementById('active-goals-section').innerHTML=html;
  }catch(e){toast('Error: '+e.message);}
}

function openGoalModal(period){
  document.getElementById('goal-period').value=period;
  document.getElementById('goal-prize').value='';
  document.getElementById('goal-target').value='';
  document.getElementById('goal-modal').style.display='flex';
}

async function saveGoal(){
  const period=document.getElementById('goal-period').value;
  const prize=document.getElementById('goal-prize').value.trim();
  const target=parseInt(document.getElementById('goal-target').value)||null;
  if(!prize){toast('Enter a prize');return;}

  // check if active goal for this period exists
  if(goals.find(g=>g.period===period)){
    if(!confirm(`There's already an active ${period} goal. Replace it?`))return;
    const existing=goals.find(g=>g.period===period);
    await sbFetch(`/rest/v1/chore_goals?id=eq.${existing.id}`,{method:'PATCH',body:JSON.stringify({active:false})});
    goals=goals.filter(g=>g.id!==existing.id);
  }

  const start=period==='weekly'?getWeekStart():getMonthStart();
  const end=period==='weekly'?getWeekEnd():getMonthEnd();

  try{
    const res=await sbFetch('/rest/v1/chore_goals',{method:'POST',headers:{'Prefer':'return=representation'},body:JSON.stringify({period,prize,points_target:target,created_by:'shared',start_date:dateStr(start),end_date:dateStr(end),confirmed:true,active:true})});
    const ng=Array.isArray(res)?res[0]:res;
    goals.push(ng);
    closeModal('goal-modal');
    renderToday();
    if(activeTab==='goals')renderGoalsTab();
    toast(`🏆 ${period} goal set! Prize: ${prize}`);
  }catch(e){toast('Error: '+e.message);}
}

async function deleteGoal(id){
  if(!confirm('Delete this goal?'))return;
  try{
    await sbFetch(`/rest/v1/chore_goals?id=eq.${id}`,{method:'PATCH',body:JSON.stringify({active:false})});
    goals=goals.filter(g=>g.id!==id);
    renderGoalsTab();renderToday();toast('Goal deleted');
  }catch(e){toast('Error: '+e.message);}
}

// ── Due / log helpers ─────────────────────────────────────
function isDueToday(chore){
  if(chore.frequency==='daily')return true;
  if(chore.frequency==='once')return!todayLogs.some(l=>l.chore_id===chore.id);
  if(chore.frequency==='weekly'){const ws=getWeekStart();return!todayLogs.some(l=>l.chore_id===chore.id&&new Date(l.completed_at)>=ws);}
  if(chore.frequency==='monthly'){const ms=getMonthStart();return!todayLogs.some(l=>l.chore_id===chore.id&&new Date(l.completed_at)>=ms);}
  return true;
}
function getLogsForChoreToday(choreId){const ts=new Date();ts.setHours(0,0,0,0);return todayLogs.filter(l=>l.chore_id===choreId&&new Date(l.completed_at)>=ts);}

// ── Mark done ─────────────────────────────────────────────
let pendingChoreId=null;
function openWhoModal(choreId){const chore=chores.find(c=>c.id===choreId);pendingChoreId=choreId;document.getElementById('who-title').textContent=`Who did "${chore?.name}"?`;document.getElementById('who-modal').style.display='flex';}

async function markDone(person){
  if(!pendingChoreId)return;
  const chore=chores.find(c=>c.id===pendingChoreId);
  const shared=person==='Both';const pts=chore?.points||1;const eachPts=shared?Math.ceil(pts/2):pts;
  try{
    const payload={chore_id:pendingChoreId,completed_by:shared?'Tyron':person,completed_at:new Date().toISOString(),shared,completed_by_2:shared?'Ansonette':null};
    const res=await sbFetch('/rest/v1/chore_logs',{method:'POST',headers:{'Prefer':'return=representation'},body:JSON.stringify(payload)});
    const log=Array.isArray(res)?res[0]:res;
    todayLogs.unshift(log);
    closeModal('who-modal');pendingChoreId=null;
    renderToday();
    toast(shared?`👨👩 Together! +${eachPts}pts each`:`${chore?.emoji||'✅'} ${person} +${pts}pt${pts!==1?'s':''}`);
  }catch(e){toast('Error: '+e.message);}
}

async function undoChore(logId){
  try{await sbFetch(`/rest/v1/chore_logs?id=eq.${logId}`,{method:'DELETE'});todayLogs=todayLogs.filter(l=>l.id!==logId);renderToday();toast('↩ Undone');}
  catch(e){toast('Error: '+e.message);}
}

// ── Tabs ──────────────────────────────────────────────────
function switchTab(tab,btn){
  activeTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  ['today','goals','history','setup'].forEach(t=>{document.getElementById('tab-'+t).style.display=t===tab?'block':'none';});
  if(tab==='today')renderToday();
  if(tab==='goals')renderGoalsTab();
  if(tab==='history')loadHistory();
  if(tab==='setup')renderSetup();
}
function switchTabById(tab){const idx={today:0,goals:1,history:2,setup:3}[tab];if(idx!==undefined)switchTab(tab,document.querySelectorAll('.tab')[idx]);}

// ── History ───────────────────────────────────────────────
async function loadHistory(){
  try{
    const since=new Date();since.setDate(since.getDate()-14);
    const logs=await sbFetch(`/rest/v1/chore_logs?completed_at=gte.${since.toISOString()}&order=completed_at.desc&limit=100&select=*`);
    if(!logs.length){document.getElementById('history-content').innerHTML=`<div class="empty-state"><div class="big">📋</div><div>No history yet</div></div>`;return;}
    document.getElementById('history-content').innerHTML=logs.map(l=>{
      const c=chores.find(c=>c.id===l.chore_id);
      const byClass=l.shared?'both':l.completed_by?.toLowerCase()||'';
      const byText=l.shared?'👨👩 Together':l.completed_by==='Tyron'?'👨 Tyron':'👩 Ansonette';
      return`<div class="hist-item"><div class="hist-icon">${c?.emoji||'🧹'}</div><div class="hist-info"><div class="hist-name">${esc(c?.name||'Unknown')}</div><div class="hist-by ${byClass}">${byText} · ⭐ ${c?.points||1}pt</div></div><div class="hist-time">${new Date(l.completed_at).toLocaleDateString([],{weekday:'short',month:'short',day:'numeric'})}<br>${new Date(l.completed_at).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</div></div>`;
    }).join('');
  }catch(e){toast('Error: '+e.message);}
}

// ── Setup ─────────────────────────────────────────────────
function renderSetup(){
  document.getElementById('chore-count').textContent=chores.length;
  document.getElementById('chore-setup-list').innerHTML=chores.map(c=>`<div class="chore-list-item"><div class="cli-emoji">${c.emoji||'🧹'}</div><div class="cli-info"><div class="cli-name">${esc(c.name)}</div><div class="cli-meta">${c.frequency} · ${c.assigned_to} · ⭐ ${c.points}pt${c.points!==1?'s':''}</div></div><button class="del-btn" onclick="deleteChore('${c.id}')">🗑</button></div>`).join('')||'<div style="color:var(--muted);font-size:13px;padding:10px 0">No chores yet</div>';
}
function renderStarterPack(){document.getElementById('starter-pack').innerHTML=STARTER_PACK.map((c,i)=>`<button onclick="addStarterChore(${i})" style="background:var(--card);border:1px solid var(--border);border-radius:8px;padding:6px 10px;font-size:12px;color:var(--text);cursor:pointer;">${c.emoji} ${c.name}</button>`).join('');}
async function addStarterChore(idx){const c=STARTER_PACK[idx];if(chores.find(ch=>ch.name===c.name)){toast(`${c.name} already exists`);return;}try{const res=await sbFetch('/rest/v1/chores',{method:'POST',headers:{'Prefer':'return=representation'},body:JSON.stringify({name:c.name,emoji:c.emoji,frequency:c.freq,assigned_to:c.assign,points:c.pts})});const nc=Array.isArray(res)?res[0]:res;chores.push(nc);chores.sort((a,b)=>a.name.localeCompare(b.name));renderSetup();toast(`${c.emoji} ${c.name} added!`);}catch(e){toast('Error: '+e.message);}}
async function addChore(){const name=document.getElementById('new-name').value.trim();if(!name){toast('Enter a name');return;}const emoji=document.getElementById('new-emoji').value.trim()||'🧹';const freq=document.getElementById('new-freq').value;const assign=document.getElementById('new-assign').value;const pts=parseInt(document.getElementById('new-pts').value)||1;try{const res=await sbFetch('/rest/v1/chores',{method:'POST',headers:{'Prefer':'return=representation'},body:JSON.stringify({name,emoji,frequency:freq,assigned_to:assign,points:pts})});const nc=Array.isArray(res)?res[0]:res;chores.push(nc);chores.sort((a,b)=>a.name.localeCompare(b.name));document.getElementById('new-name').value='';document.getElementById('new-emoji').value='';document.getElementById('new-pts').value='1';renderSetup();renderToday();toast(`${emoji} ${name} added!`);}catch(e){toast('Error: '+e.message);}}
async function deleteChore(id){if(!confirm('Delete this chore?'))return;try{await sbFetch(`/rest/v1/chores?id=eq.${id}`,{method:'PATCH',body:JSON.stringify({active:false})});chores=chores.filter(c=>c.id!==id);renderSetup();renderToday();toast('Deleted');}catch(e){toast('Error: '+e.message);}}

function closeModal(id){document.getElementById(id).style.display='none';}
function closeModalClick(e){if(e.target===e.currentTarget)closeModal(e.currentTarget.id);}
let toastTimer;
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),2500);}
</script>
